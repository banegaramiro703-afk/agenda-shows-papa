<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Papá Pro 🎸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .resumen-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-left: 4px solid #06b6d4; }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="p-4 max-w-md mx-auto mb-20">

    <header class="mb-6 text-center">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 italic uppercase tracking-tighter">Agenda Papá 🎸</h1>
    </header>

    <div id="status" class="text-center my-4 text-slate-500 italic text-sm animate-pulse font-medium">Sincronizando con la nube...</div>

    <div id="vista-principal">
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="toggleForm()" class="bg-emerald-600 text-white py-3 rounded-xl font-bold text-[11px] uppercase tracking-widest shadow-lg shadow-emerald-900/40 transition-transform active:scale-95">➕ Nuevo Show</button>
            <button onclick="cambiarVista('historial')" class="bg-slate-700 text-white py-3 rounded-xl font-bold text-[11px] uppercase tracking-widest transition-transform active:scale-95">📂 Ver Historial</button>
        </div>

        <section id="seccion-form" class="card p-5 mb-6 border-emerald-500/30 border hidden">
            <h3 class="text-xs font-bold text-emerald-400 uppercase mb-4 tracking-widest">Registrar Evento</h3>
            <form id="form-evento" class="space-y-3">
                <input type="text" id="f-evento" placeholder="Nombre del Evento" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:border-emerald-500 focus:outline-none" required>
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="f-fecha" class="p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:border-emerald-500 focus:outline-none" required>
                    <input type="time" id="f-hora" class="p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:border-emerald-500 focus:outline-none" required>
                </div>
                <input type="text" id="f-lugar" placeholder="Lugar / Dirección" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:border-emerald-500 focus:outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="f-contacto" placeholder="Cliente" class="p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:border-emerald-500 focus:outline-none">
                    <input type="tel" id="f-tel" placeholder="WhatsApp" class="p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:border-emerald-500 focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="f-total" placeholder="Total $" class="p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:border-emerald-500 focus:outline-none">
                    <input type="number" id="f-pagado" placeholder="Seña $" class="p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm text-white focus:border-emerald-500 focus:outline-none">
                </div>
                <button type="submit" id="btn-enviar" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-xs uppercase tracking-widest mt-2 shadow-lg transition-transform active:scale-95">Guardar en Agenda</button>
            </form>
        </section>

        <section class="card p-4 mb-6 border-cyan-500/30 border">
            <h3 class="text-[10px] font-bold text-cyan-400 uppercase mb-2 tracking-widest">¿Fecha disponible?</h3>
            <div class="flex gap-2">
                <input type="date" id="input-fecha" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm text-white focus:border-cyan-500 focus:outline-none">
                <button onclick="buscarFecha()" class="bg-cyan-600 px-4 py-2 rounded-xl font-bold text-xs transition-transform active:scale-95">BUSCAR</button>
            </div>
            <div id="resultado-busqueda" class="mt-3 hidden"></div>
        </section>

        <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4 ml-1">Próximos Shows</h2>
        <div id="lista-proximos" class="space-y-6"></div>
    </div>

    <div id="vista-historial" class="hidden">
        <button onclick="cambiarVista('principal')" class="mb-6 flex items-center text-cyan-400 font-bold text-sm bg-slate-800/50 py-2 px-4 rounded-xl transition-transform active:scale-95 border border-cyan-900/50">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Volver a la Agenda
        </button>
        <h2 class="text-xl font-black text-orange-400 uppercase tracking-tighter mb-6">Archivo de Shows</h2>
        
        <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 ml-1">Ingresos por Mes</h3>
        <div id="resumen-mensual" class="space-y-2 mb-8"></div>
        
        <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 ml-1">Detalle de Eventos Finalizados</h3>
        <div id="lista-pasados" class="space-y-4 opacity-75"></div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/d1yjr4l7r3o7q';
        let todosLosShows = [];

        function cambiarVista(vista) {
            if (vista === 'historial') {
                document.getElementById('vista-principal').classList.add('hidden');
                document.getElementById('vista-historial').classList.remove('hidden');
                window.scrollTo(0, 0);
            } else {
                document.getElementById('vista-historial').classList.add('hidden');
                document.getElementById('vista-principal').classList.remove('hidden');
                window.scrollTo(0, 0);
            }
        }

        function toggleForm() {
            document.getElementById('seccion-form').classList.toggle('hidden');
        }

        const limpiarPlata = (m) => {
            if (!m) return 0;
            let textoLimpio = m.toString().split(',')[0].replace(/\D/g,'');
            return parseInt(textoLimpio) || 0;
        };

        // NUEVA FUNCIÓN MEJORADA: Detecta si es Android o iOS
        function agendarCelular(evento, fecha, hora, lugar) {
            if (!fecha || !hora) {
                alert("Falta la fecha o la hora del show.");
                return;
            }

            const [d, m, y] = fecha.split('/');
            const [h, min] = hora.split(':');
            
            const startDate = new Date(y, m - 1, d, h, min);
            const endDate = new Date(startDate.getTime() + 2 * 60 * 60 * 1000); 

            // Detectamos si el celular es Android
            const isAndroid = /Android/i.test(navigator.userAgent);

            if (isAndroid) {
                // Truco para Android: abrir la app directamente usando "Intent"
                const intentURI = `intent:#Intent;action=android.intent.action.INSERT;type=vnd.android.cursor.item/event;S.title=${encodeURIComponent(evento)};S.eventLocation=${encodeURIComponent(lugar || '')};S.description=${encodeURIComponent('Registrado desde Agenda Papá 🎸')};l.beginTime=${startDate.getTime()};l.endTime=${endDate.getTime()};end`;
                window.location.href = intentURI;
            } else {
                // Truco para iOS (y compus): descargar el archivo .ics
                const formatICS = (date) => {
                    const pad = (n) => n < 10 ? '0' + n : n;
                    return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}T${pad(date.getHours())}${pad(date.getMinutes())}00`;
                };

                const icsMSG = 
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${evento}
DTSTART:${formatICS(startDate)}
DTEND:${formatICS(endDate)}
LOCATION:${lugar}
DESCRIPTION:Registrado desde tu Agenda App🎸
END:VEVENT
END:VCALENDAR`;

                const blob = new Blob([icsMSG], { type: 'text/calendar;charset=utf-8' });
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.setAttribute('download', `${evento.replace(/\s+/g, '_')}.ics`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        async function cargarShows() {
            const status = document.getElementById('status');
            const listProx = document.getElementById('lista-proximos');
            const listPasados = document.getElementById('lista-pasados');
            const resMensual = document.getElementById('resumen-mensual');
            
            try {
                const response = await fetch(API_URL);
                todosLosShows = await response.json();
                status.style.display = 'none';
                listProx.innerHTML = '';
                listPasados.innerHTML = '';
                resMensual.innerHTML = '';

                if (!todosLosShows || todosLosShows.length === 0) {
                    listProx.innerHTML = '<p class="text-center text-slate-500 text-sm">No hay eventos cargados.</p>';
                    return;
                }

                todosLosShows.sort((a, b) => {
                    const getFecha = (item) => {
                        const k = Object.keys(item).find(x => x.trim().toUpperCase() === 'FECHA');
                        return item[k] ? item[k].toString().trim() : "";
                    };
                    
                    const pA = getFecha(a).split('/');
                    const pB = getFecha(b).split('/');
                    
                    if (pA.length !== 3) return 1; 
                    if (pB.length !== 3) return -1;
                    
                    const dateA = new Date(pA[2], pA[1] - 1, pA[0]);
                    const dateB = new Date(pB[2], pB[1] - 1, pB[0]);
                    
                    return dateA - dateB; 
                });

                const hoy = new Date();
                hoy.setHours(0,0,0,0);
                let resumenData = {}; 

                todosLosShows.forEach(item => {
                    const getVal = (n) => {
                        const k = Object.keys(item).find(x => x.trim().toUpperCase() === n.toUpperCase());
                        return item[k] || "";
                    };

                    const s = {
                        evento: getVal('EVENTO'), fecha: getVal('FECHA'), hora: getVal('HORA'),
                        lugar: getVal('LUGAR'), contacto: getVal('CONTACTO'), tel: getVal('TELEFONO'),
                        total: limpiarPlata(getVal('TOTAL')), 
                        pagado: limpiarPlata(getVal('PAGADO')),
                        estado: getVal('ESTADO DE PAGO')
                    };

                    if(!s.evento) return;

                    const p = s.fecha.split('/');
                    if(p.length !== 3) return;
                    const fechaShow = new Date(p[2], p[1] - 1, p[0]);
                    
                    const pendiente = s.total - s.pagado;
                    const porcentaje = s.total > 0 ? (s.pagado / s.total) * 100 : 0;

                    const botonPagoHTML = pendiente > 0 
                        ? `<button data-evento="${s.evento.replace(/"/g, '&quot;')}" onclick="sumarPago(this.getAttribute('data-evento'), ${s.pagado}, ${s.total})" class="mt-3 w-full bg-slate-800 text-emerald-400 border border-emerald-900/50 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-transform active:scale-95">💰 Registrar Pago</button>`
                        : '';

                    const cardHTML = `
                        <div class="card p-5 shadow-2xl relative overflow-hidden">
                            <div class="flex justify-between items-start mb-3">
                                <div class="max-w-[80%]">
                                    <h3 class="font-black text-white uppercase text-lg leading-tight tracking-tight">${s.evento}</h3>
                                    <p class="text-cyan-400 text-[11px] font-bold mt-1">📍 ${s.lugar || 'Sin ubicación'}</p>
                                </div>
                                <button onclick="eliminarShow('${s.evento}')" class="text-slate-600 hover:text-red-500 p-2 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                            
                            <div class="flex items-center text-slate-400 text-xs mb-5 font-medium">
                                📅 ${s.fecha} | ⏰ ${s.hora} ${s.contacto ? '| 👤 ' + s.contacto : ''}
                            </div>
                            
                            <div class="space-y-2 mb-5">
                                <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                                    <div class="bg-gradient-to-r from-emerald-500 to-cyan-400 h-full transition-all duration-1000" style="width: ${porcentaje}%"></div>
                                </div>
                                <div class="flex justify-between text-[10px] font-black uppercase tracking-widest">
                                    <span class="text-slate-500">Cobrado: $${s.pagado.toLocaleString('es-AR')}</span>
                                    <span class="text-slate-300 flex items-center gap-1">
                                        Total: $${s.total.toLocaleString('es-AR')}
                                        <button onclick="editarTotal(this.getAttribute('data-evento'), ${s.total})" data-evento="${s.evento.replace(/"/g, '&quot;')}" class="text-slate-500 hover:text-cyan-400 transition-colors text-sm" title="Editar precio total">✏️</button>
                                    </span>
                                </div>
                                <div class="text-left text-[11px] font-black uppercase mt-1 ${pendiente > 0 ? 'text-orange-400' : 'text-emerald-400'}">
                                    ${pendiente > 0 ? 'Debe: $' + pendiente.toLocaleString('es-AR') : '✅ PAGO COMPLETADO'}
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <a href="https://wa.me/${s.tel.replace(/\D/g,'')}" target="_blank" class="flex justify-center items-center bg-emerald-600/20 text-emerald-400 text-center py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition-colors hover:bg-emerald-600/40">WhatsApp</a>
                                <button onclick="agendarCelular('${s.evento.replace(/'/g, "\\'")}', '${s.fecha}', '${s.hora}', '${(s.lugar || '').replace(/'/g, "\\'")}')" class="bg-blue-600/20 text-blue-400 text-center py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition-colors hover:bg-blue-600/40">🗓️ Agenda App</button>
                            </div>
                            
                            ${botonPagoHTML}
                        </div>
                    `;

                    if (fechaShow >= hoy) {
                        listProx.innerHTML += cardHTML;
                    } else {
                        listPasados.insertAdjacentHTML('afterbegin', cardHTML); 
                        
                        const nombreMes = fechaShow.toLocaleString('es-ES', { month: 'long', year: 'numeric' });
                        resumenData[nombreMes] = (resumenData[nombreMes] || 0) + s.total;
                    }
                });

                Object.keys(resumenData).forEach(mes => {
                    resMensual.innerHTML += `
                        <div class="resumen-card p-4 rounded-xl flex justify-between items-center shadow-lg">
                            <span class="text-xs font-black uppercase text-slate-300 tracking-widest">${mes}</span>
                            <span class="text-cyan-400 font-black text-lg">$${resumenData[mes].toLocaleString('es-AR')}</span>
                        </div>
                    `;
                });

            } catch (err) { status.innerHTML = '<span class="text-red-500 font-bold">Error de conexión.</span>'; }
        }

        async function editarTotal(nombre, totalActual) {
            const nuevoTotalStr = prompt(`El total actual para "${nombre}" es $${totalActual.toLocaleString('es-AR')}.\n\nIngresá el nuevo precio total correcto (escribí solo números):`, totalActual);
            if (!nuevoTotalStr) return; 
            const nuevoTotal = parseInt(nuevoTotalStr.replace(/\D/g, ''));
            if (isNaN(nuevoTotal) || nuevoTotal <= 0) {
                alert("Monto inválido. Escribí un número sin símbolos.");
                return;
            }
            if (!confirm(`Vas a cambiar el precio total del show a $${nuevoTotal.toLocaleString('es-AR')}.\n\n¿Estás seguro?`)) return;

            document.getElementById('status').style.display = 'block';
            document.getElementById('status').innerText = 'Actualizando precio...';

            try {
                const res = await fetch(`${API_URL}/EVENTO/${encodeURIComponent(nombre)}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { "TOTAL": nuevoTotal } })
                });

                if (res.ok) {
                    alert("¡Precio actualizado con éxito!");
                    cargarShows(); 
                } else {
                    alert("Error al guardar en el Excel.");
                }
            } catch (err) {
                alert("Error de red.");
            }
        }

        async function sumarPago(nombre, pagadoActual, total) {
            const pendiente = total - pagadoActual;
            const montoStr = prompt(`El show "${nombre}" debe $${pendiente.toLocaleString('es-AR')}.\n\n¿Cuánto dinero está pagando el cliente ahora? (Escribí solo números)`);
            if (!montoStr) return; 
            const montoIngresado = parseInt(montoStr.replace(/\D/g, ''));
            
            if (isNaN(montoIngresado) || montoIngresado <= 0) {
                alert("Monto inválido. Escribí un número sin símbolos.");
                return;
            }

            const nuevoTotalPagado = pagadoActual + montoIngresado;
            if (!confirm(`Vas a registrar un pago de $${montoIngresado.toLocaleString('es-AR')}.\nEl total cobrado pasará a ser $${nuevoTotalPagado.toLocaleString('es-AR')}.\n\n¿Estás seguro?`)) return;

            document.getElementById('status').style.display = 'block';
            document.getElementById('status').innerText = 'Registrando pago...';

            try {
                const res = await fetch(`${API_URL}/EVENTO/${encodeURIComponent(nombre)}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { "PAGADO": nuevoTotalPagado } })
                });

                if (res.ok) {
                    alert("¡Pago registrado con éxito!");
                    cargarShows(); 
                } else {
                    alert("Error al guardar en el Excel.");
                }
            } catch (err) {
                alert("Error de red.");
            }
        }

        async function eliminarShow(nombre) {
            if (!confirm(`¿Estás seguro que querés borrar el show "${nombre}"? Esta acción no se puede deshacer.`)) return;
            try {
                const res = await fetch(`${API_URL}/EVENTO/${encodeURIComponent(nombre)}`, { method: 'DELETE' });
                if (res.ok) {
                    alert("Show eliminado.");
                    cargarShows();
                } else { alert("No se pudo borrar."); }
            } catch (err) { alert("Error al borrar."); }
        }

        document.getElementById('form-evento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-enviar');
            btn.innerHTML = "GUARDANDO...";
            btn.disabled = true;

            const f = document.getElementById('f-fecha').value.split('-');
            const fechaFormateada = `${f[2]}/${f[1]}/${f[0]}`;

            const nuevoShow = {
                "EVENTO": document.getElementById('f-evento').value,
                "FECHA": fechaFormateada,
                "HORA": document.getElementById('f-hora').value,
                "LUGAR": document.getElementById('f-lugar').value,
                "CONTACTO": document.getElementById('f-contacto').value,
                "TELEFONO": document.getElementById('f-tel').value,
                "TOTAL": document.getElementById('f-total').value,
                "PAGADO": document.getElementById('f-pagado').value
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [nuevoShow] })
                });

                if (res.ok) {
                    document.getElementById('form-evento').reset();
                    toggleForm();
                    cargarShows();
                } else { alert("No se pudo guardar."); }
            } catch (err) { alert("Hubo un error al guardar."); } 
            finally { btn.innerHTML = "Guardar en Agenda"; btn.disabled = false; }
        });

        function buscarFecha() {
            const input = document.getElementById('input-fecha').value;
            const resDiv = document.getElementById('resultado-busqueda');
            if (!input) return;

            const [y, m, d] = input.split('-');
            const f1 = `${d}/${m}/${y}`;
            const f2 = `${parseInt(d)}/${parseInt(m)}/${y}`;

            const encontrado = todosLosShows.find(item => {
                const k = Object.keys(item).find(x => x.trim().toUpperCase() === 'FECHA');
                const val = item[k] ? item[k].toString().trim() : "";
                return val === f1 || val === f2;
            });

            resDiv.classList.remove('hidden');

            if (encontrado) {
                resDiv.innerHTML = `
                    <div class="p-4 bg-red-900/30 border border-red-500 rounded-xl text-center shadow-lg">
                        <span class="text-red-500 text-sm font-black uppercase tracking-widest">❌ Ocupado</span><br>
                        <span class="text-white text-xs mt-1 block">${encontrado.EVENTO || 'Reservado'}</span>
                    </div>`;
            } else {
                resDiv.innerHTML = `
                    <div class="p-4 bg-emerald-900/30 border border-emerald-500 rounded-xl text-center shadow-lg">
                        <span class="text-emerald-400 text-sm font-black uppercase tracking-widest">✅ Disponible</span><br>
                        <span class="text-slate-300 text-xs mt-1 block">Para el ${parseInt(d)}/${parseInt(m)}/${y}</span>
                    </div>`;
            }
        }

        cargarShows();
    </script>
</body>
</html>
