<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Papá 🎸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .btn-excel { background: linear-gradient(90deg, #10b981 0%, #059669 100%); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); } /* Hace el icono del calendario blanco */
    </style>
</head>
<body class="p-6 max-w-md mx-auto mb-10">

    <header class="mb-8 text-center">
        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 italic uppercase tracking-tighter">Agenda Papá 🎸</h1>
        
        <a href="https://docs.google.com/spreadsheets/d/1kd0WqimD8cMIVRa5quN11ONo09m_k_it9L-GnSSBfkM/edit?gid=243041279#gid=243041279" target="_blank" class="mt-6 inline-flex items-center justify-center w-full btn-excel text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-emerald-900/40 transition-transform active:scale-95">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7.5L14.5 2zM19 19H5V4h8v4h6v11zM7 10h10v2H7v-2zm0 4h10v2H7v-2z"/></svg>
            GESTIONAR SHOWS (EXCEL)
        </a>
    </header>

    <section class="card p-5 mb-8 border-cyan-500/30 border">
        <h3 class="text-sm font-bold text-cyan-400 uppercase mb-3 tracking-widest text-center">¿Fecha disponible? 📅</h3>
        <div class="flex gap-2">
            <input type="date" id="input-fecha" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-cyan-500 text-white">
            <button onclick="buscarFecha()" class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded-xl font-bold text-sm transition-all">BUSCAR</button>
        </div>
        <div id="resultado-busqueda" class="mt-4 text-center font-bold text-sm hidden">
            </div>
    </section>

    <div id="status" class="text-center my-10 text-slate-400 italic font-medium animate-pulse">Sincronizando con la nube...</div>
    <div id="lista-shows" class="space-y-6"></div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/d1yjr4l7r3o7q';
        let todosLosShows = []; // Variable global para guardar los datos

        async function cargarShows() {
            const container = document.getElementById('lista-shows');
            const status = document.getElementById('status');
            
            try {
                const response = await fetch(API_URL);
                todosLosShows = await response.json(); // Guardamos los datos para la búsqueda
                
                status.style.display = 'none';
                container.innerHTML = '';

                if (!todosLosShows || todosLosShows.length === 0) {
                    container.innerHTML = '<p class="text-center text-slate-500">No hay eventos cargados.</p>';
                    return;
                }

                todosLosShows.forEach(item => {
                    const getVal = (nombre) => {
                        const key = Object.keys(item).find(k => k.trim().toUpperCase() === nombre.toUpperCase());
                        return item[key] || "";
                    };

                    const show = {
                        evento: getVal('EVENTO'),
                        fecha: getVal('FECHA'),
                        hora: getVal('HORA'),
                        lugar: getVal('LUGAR'),
                        contacto: getVal('CONTACTO'),
                        telefono: getVal('TELEFONO'),
                        total: getVal('TOTAL'),
                        pagado: getVal('PAGADO'),
                        estado: getVal('ESTADO DE PAGO')
                    };

                    if(!show.evento) return;

                    const p = show.fecha.split('/');
                    const fechaLink = p.length === 3 ? `${p[2]}${p[1]}${p[0]}` : "20260101";
                    const limpiar = (m) => parseInt(m.toString().split(',')[0].replace(/\D/g,'')) || 0;
                    
                    const t = limpiar(show.total);
                    const pg = limpiar(show.pagado);
                    const pendiente = t - pg;
                    const porcentaje = t > 0 ? (pg / t) * 100 : 0;

                    container.innerHTML += `
                        <div class="card p-6 shadow-2xl">
                            <div class="flex justify-between items-start mb-4">
                                <div class="max-w-[75%]">
                                    <h2 class="text-xl font-bold text-white uppercase leading-tight tracking-tight">${show.evento}</h2>
                                    <p class="text-cyan-400 text-sm font-bold mt-1">📍 ${show.lugar}</p>
                                </div>
                                <span class="bg-slate-800 text-cyan-300 text-[10px] font-black px-2 py-1 rounded-lg border border-cyan-900/50">${show.hora}</span>
                            </div>
                            <div class="flex items-center text-slate-400 text-xs mb-6 font-medium">
                                📅 ${show.fecha} | <span class="ml-1 text-slate-200 font-bold">👤 ${show.contacto}</span>
                            </div>
                            <div class="space-y-3 mb-6">
                                <div class="flex justify-between text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                    <span>COBRADO: $${pg.toLocaleString('es-AR')}</span>
                                    <span>TOTAL: $${t.toLocaleString('es-AR')}</span>
                                </div>
                                <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden p-[1px]">
                                    <div class="bg-gradient-to-r from-emerald-500 to-cyan-400 h-full rounded-full transition-all duration-1000" style="width: ${porcentaje}%"></div>
                                </div>
                                <div class="flex justify-between items-center text-[11px] font-bold">
                                    <span class="text-slate-400 italic">${show.estado}</span>
                                    <p class="${pendiente > 0 ? 'text-orange-400' : 'text-emerald-400'} uppercase">
                                        ${pendiente > 0 ? 'Falta: $' + pendiente.toLocaleString('es-AR') : '✓ TOTALMENTE PAGADO'}
                                    </p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <a href="https://wa.me/${show.telefono.replace(/\D/g,'')}" target="_blank" class="bg-emerald-600 text-white text-center py-4 rounded-2xl font-bold text-sm shadow-lg shadow-emerald-900/20">WhatsApp</a>
                                <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(show.evento)}&dates=${fechaLink}T210000Z/${fechaLink}T235900Z&details=Lugar: ${encodeURIComponent(show.lugar)}" target="_blank" class="bg-blue-600 text-white text-center py-4 rounded-2xl font-bold text-sm shadow-lg shadow-blue-900/20">Calendario</a>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                status.innerHTML = '<p class="text-red-500 font-bold">Error de conexión.</p>';
            }
        }

        // FUNCIÓN DE BÚSQUEDA
        function buscarFecha() {
            const input = document.getElementById('input-fecha').value;
            const resDiv = document.getElementById('resultado-busqueda');
            
            if (!input) return;

            // Formatear la fecha del input (AAAA-MM-DD) a (DD/MM/AAAA) para comparar con Excel
            const [y, m, d] = input.split('-');
            const fechaBuscada = `${d}/${m}/${y}`;

            // Buscar en el array de shows
            const showEncontrado = todosLosShows.find(item => {
                const key = Object.keys(item).find(k => k.trim().toUpperCase() === 'FECHA');
                return item[key] === fechaBuscada;
            });

            resDiv.classList.remove('hidden');

            if (showEncontrado) {
                resDiv.innerHTML = `<span class="text-red-500">❌ OCUPADO: ${showEncontrado.EVENTO || 'Reservado'}</span>`;
            } else {
                resDiv.innerHTML = `<span class="text-emerald-400">✅ DISPONIBLE para el ${fechaBuscada}</span>`;
            }
        }

        cargarShows();
    </script>
</body>
</html>
